# AI Coaching System — Portainer Stack
# Deploy on TrueNAS SCALE via Portainer → Stacks → Add Stack
#
# Before deploying:
#   1. Create datasets under your pool, e.g. /mnt/tank/coaching/
#   2. Fill in all environment variables in Portainer's env editor
#   3. Make the GitHub package public OR add a GHCR_TOKEN secret for Watchtower
#
# TrueNAS dataset layout:
#   /mnt/<pool>/coaching/influxdb/
#   /mnt/<pool>/coaching/postgres/
#   /mnt/<pool>/coaching/chromadb/
#   /mnt/<pool>/coaching/grafana/
#   /mnt/<pool>/coaching/garmin/
#   /mnt/<pool>/coaching/garth/
#   /mnt/<pool>/coaching/logs/
#   /mnt/<pool>/coaching/config/
#   /mnt/<pool>/coaching/workout_imports/

services:

  # ---------------------------------------------------------------------------
  # InfluxDB 2.x — time-series storage (HR, power, pace, HRV, TSS)
  # ---------------------------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: coaching_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-coaching}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-training}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — relational storage (plans, execution, TR library)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: coaching_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coaching}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-coaching_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coaching}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # ChromaDB — vector store for RAG
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest  # TODO: pin to specific version, e.g. chromadb/chroma:1.0.12
    container_name: coaching_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # Grafana — fitness dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest  # TODO: pin to specific version, e.g. grafana/grafana:12.0.0
    container_name: coaching_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_SERVER_ROOT_URL: http://${TRUENAS_IP:-localhost}:3000
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # Config UI + API — FastAPI backend (pulls from GHCR)
  # ---------------------------------------------------------------------------
  config-ui:
    image: ghcr.io/sasharif87/personal-training-app:latest
    container_name: coaching_config_ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CONFIG_API_KEY: ${CONFIG_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000}
      OLLAMA_PRIMARY_URL: ${OLLAMA_PRIMARY_URL:-http://192.168.50.46:11434}
      OLLAMA_FALLBACK_URL: ${OLLAMA_FALLBACK_URL:-}
      OLLAMA_HEAVY_MODEL: ${OLLAMA_HEAVY_MODEL:-qwen2.5:72b}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-qwen2.5:14b}
      SEASON_CONFIG_PATH: /config/season.json
      WORKOUTS_CONFIG_DIR: /app/config/workouts
      WORKOUT_IMPORT_DIR: /data/workout_imports
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-coaching}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-training}
      DATABASE_URL: postgresql://${POSTGRES_USER:-coaching}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-coaching_db}
    volumes:
      - season-config:/config
      - workout-imports:/data/workout_imports
    command: uvicorn backend.api.app:app --host 0.0.0.0 --port 8080
    depends_on:
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # Coaching App — daily pipeline + APScheduler daemon (pulls from GHCR)
  # ---------------------------------------------------------------------------
  coaching-app:
    image: ghcr.io/sasharif87/personal-training-app:latest
    container_name: coaching_app
    restart: unless-stopped
    environment:
      OLLAMA_PRIMARY_URL: ${OLLAMA_PRIMARY_URL:-http://192.168.50.46:11434}
      OLLAMA_FALLBACK_URL: ${OLLAMA_FALLBACK_URL:-}
      OLLAMA_HEAVY_MODEL: ${OLLAMA_HEAVY_MODEL:-qwen2.5:72b}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-qwen2.5:14b}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-coaching}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-training}
      DATABASE_URL: postgresql://${POSTGRES_USER:-coaching}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-coaching_db}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      GARMIN_USERNAME: ${GARMIN_USERNAME}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
      GARMIN_DATA_DIR: /data/garmin
      GARTH_HOME: /data/garth
      ZWIFT_WORKOUTS_DIR: /data/zwift_workouts
      LOG_DIR: /data/logs
      SEASON_CONFIG_PATH: /config/season.json
      NTFY_URL: ${NTFY_URL:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      WORKOUTS_CONFIG_DIR: /app/config/workouts
      WORKOUT_IMPORT_DIR: /data/workout_imports
      TZ: ${TZ:-UTC}
    volumes:
      - garmin-data:/data/garmin
      - garth-tokens:/data/garth
      - workout-imports:/data/workout_imports
      - logs:/data/logs
      - season-config:/config
    command: python main.py --daemon
    depends_on:
      influxdb:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "find", "/tmp/scheduler_heartbeat", "-mmin", "-6"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # DB Backup — weekly pg_dump, keeps last 4
  # ---------------------------------------------------------------------------
  db-backup:
    image: postgres:16
    container_name: coaching_db_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-coaching}
      POSTGRES_DB: ${POSTGRES_DB:-coaching_db}
    volumes:
      - logs:/data/logs
    entrypoint: >
      /bin/sh -c "
        while true; do
          DUMP_FILE=/data/logs/pg_backup_$$(date +%Y%m%d_%H%M%S).sql;
          pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB > $$DUMP_FILE && echo \"Backup: $$DUMP_FILE\";
          ls -1t /data/logs/pg_backup_*.sql 2>/dev/null | tail -n +5 | xargs -r rm --;
          sleep 604800;
        done
      "
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  # ---------------------------------------------------------------------------
  # Watchtower — polls GHCR every 5 min, auto-redeploys on new image push
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest  # TODO: pin to specific version, e.g. containrrr/watchtower:1.7.1
    container_name: coaching_watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_SCOPE: coaching
      REPO_USER: ${GHCR_USER:-sasharif87}
      REPO_PASS: ${GHCR_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: coaching_config_ui coaching_app
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

# ---------------------------------------------------------------------------
# Volumes — update device paths to match your TrueNAS pool/dataset layout
# ---------------------------------------------------------------------------
volumes:
  influxdb-data:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/influxdb, o: bind }
  influxdb-config:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/influxdb, o: bind }
  postgres-data:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/postgres, o: bind }
  chromadb-data:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/chromadb, o: bind }
  grafana-data:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/grafana, o: bind }
  garmin-data:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/garmin, o: bind }
  garth-tokens:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/garth, o: bind }
  logs:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/logs, o: bind }
  season-config:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/config, o: bind }
  workout-imports:
    driver: local
    driver_opts: { type: none, device: /mnt/tank/coaching/workout_imports, o: bind }
